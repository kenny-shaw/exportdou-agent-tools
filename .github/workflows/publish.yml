name: Publish CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - name: Publish when this version is not already on npm
        shell: bash
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          if npm view "exportdou@${version}" version >/dev/null 2>&1; then
            echo "exportdou@${version} is already published"
          else
            npm publish --workspace exportdou --access public
          fi
